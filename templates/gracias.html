<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¡Pago exitoso! — NetShield</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #040d14; --accent: #00e5ff; --text: #cfe8f3; --muted: #4a7a99;
      --mono: 'Share Tech Mono', monospace; --sans: 'Barlow', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--sans);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .card {
      position: relative; z-index: 1;
      border: 1px solid #0d3555; padding: 4rem 3rem; max-width: 500px;
      background: #081927;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; display: block; }
    .tag { font-family: var(--mono); color: var(--accent); font-size: .75rem;
           letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1rem; }
    h1 { font-size: 2rem; font-weight: 900; margin-bottom: 1rem; }
    p { color: var(--muted); line-height: 1.7; margin-bottom: 2rem; }
    a {
      display: inline-block; background: var(--accent); color: #040d14;
      padding: .75rem 2rem; font-family: var(--mono); font-weight: 700;
      font-size: .9rem; text-decoration: none; letter-spacing: 1px;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      transition: opacity .2s;
    }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">✓</span>
    <p class="tag">// Pago confirmado</p>
    <h1>¡Bienvenido a NetShield!</h1>
    <p>Tu suscripción fue procesada con éxito. En las próximas horas recibirás un correo con los detalles de tu plan y los próximos pasos.</p>
    <a href="/">← Volver al inicio</a>
  </div>
</body>
</html>
